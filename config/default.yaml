# OHE System — Default Configuration
# All values can be overridden via environment variables or a local config.yaml

ingestion:
  target_fps: 0
  frame_skip: 1

# ---- Input source -----------------------------------------------------------
input:
  # 'video_file' or 'camera'
  mode: "video_file"
  # OpenCV camera index for live camera mode
  camera_index: 0
  # Target FPS for camera capture
  camera_fps: 25.0

processing:
  roi: [0, 70, 640, 160]
  clahe_clip_limit: 2.0
  clahe_tile_grid_size: [8, 8]
  blur_kernel_size: 5
  canny_threshold1: 30
  canny_threshold2: 100
  hough_rho: 1
  hough_theta_deg: 1.0
  hough_threshold: 40
  hough_min_line_length: 30
  hough_max_line_gap: 20
  min_detection_confidence: 0.2

calibration:
  file: "config/calibration.json"
  fallback_px_per_mm: 10.0

rules:
  stagger:
    warning_mm: 150.0
    critical_mm: 200.0
  diameter:
    min_warning_mm: 10.0
    min_critical_mm: 8.0
    max_warning_mm: 15.0
    max_critical_mm: 17.0

logging:
  session_dir: "data/logs"
  sqlite_enabled: true
  csv_enabled: true
  csv_max_rows: 100000
  log_level: "INFO"

# ---- Event video clip generation -------------------------------------------
event_video:
  enabled: true
  pre_frames: 90
  post_frames: 60
  events_dir: "data/events"
  video_fps: 25.0

# ---- Geolocation ------------------------------------------------------------
geo:
  enabled: true
  # 'simulated' or 'live'
  mode: "simulated"
  simulated_speed_kmh: 60.0
  origin_latitude: 28.6139
  origin_longitude: 77.2090

# ---- Vehicle speed ----------------------------------------------------------
speed:
  # 'simulated' or 'live'
  mode: "simulated"
  simulated_base_kmh: 60.0
  # Max random jitter per frame (km/h) for realistic variation
  simulated_jitter_kmh: 5.0

# ---- Video / training directory ---------------------------------------------
video_directory:
  training_videos_dir: "data/videos"
  frames_dir: "data/frames"
  models_dir: "data/models"
  # Root directory for track-scoped test run data
  tracks_dir: "data/tracks"

# ---- Algorithm version ------------------------------------------------------
model_version: "classical-v1"

ui:
  window_width: 1440
  window_height: 900
  chart_history_frames: 500
  overlay_wire_colour: [0, 255, 0]
  overlay_centre_colour: [0, 0, 255]
